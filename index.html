<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>UglifyJS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <a class="logo" href="#" id="header-link">
      <span class="logo-icon">{}</span>
      <span class="logo-name">UglifyJS</span>
      <span class="logo-ver">v3</span>
    </a>
    <span class="header-tagline">JavaScript minifier</span>
    <div class="header-actions">
      <label class="btn btn-ghost" title="Upload a .js file">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path d="M8 10V3M5 6l3-3 3 3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Upload
        <input type="file" accept=".js" id="file-upload">
      </label>
      <button class="btn btn-ghost" id="btn-options" title="Minifier options">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14M3.515 3.515l1.06 1.06M11.425 11.425l1.06 1.06M3.515 12.485l1.06-1.06M11.425 4.575l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Options
      </button>
    </div>
  </header>

  <!-- ── Workspace ── -->
  <main class="workspace">

    <!-- Input panel -->
    <section class="panel" id="input-panel">
      <div class="panel-bar">
        <span class="panel-label">Input</span>
        <span class="panel-bytes" id="stats-in"></span>
      </div>

      <textarea
        id="in"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        placeholder="Paste JavaScript here…"></textarea>

      <div class="drop-zone" id="drop-zone">Drop .js file to load</div>

      <div class="panel-footer">
        <button class="btn btn-primary" id="btn-go">Minify</button>
      </div>
    </section>

    <!-- Output panel -->
    <section class="panel" id="output-panel">
      <div class="panel-bar">
        <span class="panel-label">Output</span>
        <span class="panel-bytes" id="stats-out"></span>
      </div>

      <div class="error-pane" id="error-pane">
        <pre id="error"></pre>
      </div>

      <textarea
        id="out"
        spellcheck="false"
        readonly
        placeholder="Minified output will appear here…"></textarea>

      <div class="panel-footer">
        <span class="panel-footer-spacer"></span>
        <div class="bar-actions">
          <button class="btn btn-ghost" id="btn-copy" disabled>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
              <rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M11 5V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span class="btn-text">Copy</span>
          </button>
          <button class="btn btn-ghost" id="btn-download" disabled>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
              <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Save
          </button>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Options modal ── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Minifier options">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Minifier options</span>
        <button class="btn-close" id="btn-options-close" aria-label="Close options">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <textarea id="options" spellcheck="false">{
  parse: {
    bare_returns     : false,
    expression       : false,
    filename         : null,
    html5_comments   : false,
    shebang          : true,
    strict           : false,
    toplevel         : null
  },
  compress: {
    arrows           : true,
    booleans         : true,
    collapse_vars    : true,
    comparisons      : true,
    conditionals     : true,
    dead_code        : true,
    drop_console     : true,
    drop_debugger    : true,
    evaluate         : true,
    expression       : false,
    global_defs      : {},
    hoist_funs       : true,
    hoist_props      : true,
    hoist_vars       : false,
    if_return        : true,
    inline           : 3,
    join_vars        : true,
    keep_fargs       : false,
    keep_fnames      : false,
    keep_infinity    : true,
    loops            : true,
    negate_iife      : true,
    passes           : 3,
    properties       : true,
    pure_getters     : "strict",
    pure_funcs       : null,
    reduce_funcs     : true,
    reduce_vars      : true,
    sequences        : true,
    side_effects     : true,
    switches         : true,
    top_retain       : null,
    toplevel         : false,
    typeofs          : true,
    unsafe           : false,
    unsafe_comps     : false,
    unsafe_Function  : false,
    unsafe_math      : false,
    unsafe_proto     : false,
    unsafe_regexp    : false,
    unsafe_undefined : false,
    unused           : true
  },
  mangle: {
    eval             : false,
    keep_fnames      : false,
    properties       : false,
    reserved         : [],
    toplevel         : false
  },
  output: {
    ascii_only       : false,
    beautify         : false,
    comments         : false,
    indent_level     : 4,
    indent_start     : 0,
    inline_script    : true,
    keep_quoted_props: false,
    max_line_len     : false,
    preamble         : null,
    preserve_line    : false,
    quote_keys       : false,
    quote_style      : 0,
    semicolons       : true,
    shebang          : true,
    source_map       : null,
    webkit           : false,
    width            : 80,
    wrap_iife        : false
  },
  wrap: false
}</textarea>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-options-reset">Reset to defaults</button>
        <button class="btn btn-primary" id="btn-options-save">Apply</button>
      </div>
    </div>
  </div>

  <script src="lib/minify.js"></script>
  <script src="lib/utils.js"></script>
  <script src="lib/ast.js"></script>
  <script src="lib/parse.js"></script>
  <script src="lib/transform.js"></script>
  <script src="lib/scope.js"></script>
  <script src="lib/output.js"></script>
  <script src="lib/compress.js"></script>
  <script src="lib/propmangle.js"></script>
  <script src="script.js"></script>
</body>
</html>
