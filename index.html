<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UglifyJS</title>
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="s-input">

<div class="header">
  <div class="header-left">
    <a id="header-link" href="./" class="logo">
      <span class="logo-badge">{}</span>
      <span class="logo-text">UglifyJS <span class="logo-ver">3</span></span>
    </a>
    <span class="header-sep"></span>
    <span class="header-tagline">JavaScript Minifier</span>
  </div>
  <div class="header-right">
  </div>
</div>

<div class="content">

  <div class="col i i-input" data-label="Input">
    <div class="drop-zone" id="drop-zone">Drop a .js file here</div>
    <textarea id="in" spellcheck="false" tabindex="1" autofocus placeholder="Paste JavaScript here, or upload a file…"></textarea>
    <div class="tools">
      <label class="btn-file" tabindex="2">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 6l4-5 4 5M2 12v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Upload
        <input type="file" id="file-upload" accept=".js" tabindex="-1">
      </label>
      <button id="btn-options" tabindex="3">Options</button>
      <label class="label-ait"><input id="cb-as-i-type" type="checkbox" checked> As I type</label>
      <button class="btn-main" id="btn-go" tabindex="1">Minify</button>
    </div>
  </div>

  <div class="col i i-options" data-label="Options">
    <textarea id="options" spellcheck="false" tabindex="1">{
  parse: {
    bare_returns     : false,
    expression       : false,
    filename         : null,
    html5_comments   : false,
    shebang          : true,
    strict           : false,
    toplevel         : null
  },
  compress: {
    arrows           : true,
    booleans         : true,
    collapse_vars    : true,
    comparisons      : true,
    conditionals     : true,
    dead_code        : true,
    drop_console     : true,
    drop_debugger    : true,
    evaluate         : true,
    expression       : false,
    global_defs      : {},
    hoist_funs       : false,
    hoist_props      : true,
    hoist_vars       : false,
    if_return        : true,
    inline           : 3,
    join_vars        : true,
    keep_fargs       : false,
    keep_fnames      : false,
    keep_infinity    : true,
    loops            : true,
    negate_iife      : true,
    passes           : 3,
    properties       : true,
    pure_getters     : "strict",
    pure_funcs       : null,
    reduce_funcs     : true,
    reduce_vars      : true,
    sequences        : true,
    side_effects     : true,
    switches         : true,
    top_retain       : null,
    toplevel         : false,
    typeofs          : true,
    unsafe           : false,
    unsafe_comps     : false,
    unsafe_Function  : false,
    unsafe_math      : false,
    unsafe_proto     : false,
    unsafe_regexp    : false,
    unsafe_undefined : false,
    unused           : true
  },
  mangle: {
    eval             : false,
    keep_fnames      : false,
    properties       : false,
    reserved         : [],
    toplevel         : false
  },
  output: {
    ascii_only       : false,
    beautify         : false,
    comments         : false,
    indent_level     : 4,
    indent_start     : 0,
    inline_script    : true,
    keep_quoted_props: false,
    max_line_len     : false,
    preamble         : null,
    preserve_line    : false,
    quote_keys       : false,
    quote_style      : 0,
    semicolons       : true,
    shebang          : true,
    source_map       : null,
    webkit           : false,
    width            : 80,
    wrap_iife        : false
  },
  wrap: false
}</textarea>
    <div class="tools">
      <button class="btn-main" id="btn-options-save" tabindex="2">Save</button>
      <button id="btn-options-reset" tabindex="2">Use defaults</button>
    </div>
  </div>

  <div class="col i i-output" data-label="Output">
    <div class="output-bar">
      <span id="stats"></span>
      <button id="btn-copy" class="btn-icon" title="Copy to clipboard">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Copy
      </button>
      <button id="btn-download" class="btn-icon" title="Download minified file">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 14h8M4 10l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Download
      </button>
    </div>
    <textarea id="out" spellcheck="false" tabindex="3" placeholder="Minified output appears here…" readonly></textarea>
  </div>

  <div class="col i i-error" data-label="Error">
    <pre id="error"></pre>
  </div>

</div>

<script src="lib/minify.js"></script>
<script src="lib/utils.js"></script>
<script src="lib/ast.js"></script>
<script src="lib/parse.js"></script>
<script src="lib/transform.js"></script>
<script src="lib/scope.js"></script>
<script src="lib/output.js"></script>
<script src="lib/compress.js"></script>
<script src="lib/propmangle.js"></script>
<script src="script.js"></script>
</body>
</html>
